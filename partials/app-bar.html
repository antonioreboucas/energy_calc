<header class="app-bar">
  <button class="btn-icone btn-voltar" id="btn-voltar" aria-label="Voltar" style="display:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/><path d="M19 12H9"/></svg>
  </button>
  <a href="dashboard" class="app-bar-logo">
    <img src="icons/icon-192.png" alt="" width="28" height="28" />
    EnergyCalc
  </a>
  <div class="app-bar-acoes">
    <button class="btn-icone" id="btn-notificacoes" aria-label="Notificações" onclick="alternarPainelNotificacoes()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6" /><path d="M10 20a2 2 0 0 0 4 0" /></svg>
      <span class="badge-notificacao" id="badge-notificacao" style="display:none;"></span>
    </button>
    <div class="painel-notificacoes modal-hidden" id="painel-notificacoes"></div>

    <button class="avatar" id="btn-perfil" aria-label="Perfil" onclick="alternarMenuPerfil()">
      <span id="avatar-iniciais">--</span>
    </button>
    <div class="menu-perfil modal-hidden" id="menu-perfil">
      <p class="label-md" id="perfil-nome">—</p>
      <p class="caption" id="perfil-email">—</p>
      <hr />
      <a class="menu-perfil-item" href="perfil">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4" /><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1" /></svg>
        Meu perfil
      </a>
      <button class="menu-perfil-item" onclick="logout()" style="width:100%; border:none; background:none; text-align:left; color:var(--error); cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </div>
</header>
