<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histórico de Faturas — EnergyCalc</title>
  <meta name="theme-color" content="#006b2c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>
  <div id="app-bar"></div>

  <main class="pagina container">
    <div class="mb-lg mt-lg">
      <h1 class="headline-md" style="font-weight: 700;">Histórico de Faturas</h1>
      <p class="caption texto-secundario mt-sm">Acompanhe seu consumo e gastos mensais detalhados.</p>
    </div>

    <button class="btn btn-primary btn-block btn-lg mb-lg" id="btn-enviar-fatura" style="border-radius: var(--radius-md); gap: 8px;" onclick="window.location.href='enviar_fatura'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      Enviar Nova Fatura
    </button>

    <div class="flex-col gap-lg mb-xl">
      <!-- Media Mensal -->
      <div class="card card-historico-summary">
        <div class="flex items-center gap-xs mb-sm" style="color: var(--primary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          <span class="caption" style="font-weight: 600; text-transform: uppercase;">Média Mensal</span>
        </div>
        <p class="headline-md" id="resumo-media" style="font-weight: 600; font-size: 24px;">--- kWh</p>
        <p class="caption texto-secundario mt-xs">Últimos 6 meses</p>
      </div>

      <!-- Total em 2024 -->
      <div class="card card-historico-summary">
        <div class="flex items-center gap-xs mb-sm" style="color: var(--secondary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          <span class="caption" style="font-weight: 600; text-transform: uppercase;">Total em <span id="resumo-ano-label">----</span></span>
        </div>
        <p class="headline-md" id="resumo-total" style="font-weight: 600; font-size: 24px;">R$ ---</p>
        <p class="caption texto-secundario mt-xs" id="resumo-periodo">Jan - Jun</p>
      </div>

      <!-- Status das faturas -->
      <div class="card card-historico-summary">
        <div class="flex items-center gap-xs mb-sm" style="color: #a36700;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
          <span class="caption" style="font-weight: 600; text-transform: uppercase;">Status das Faturas</span>
        </div>
        <p class="headline-md" id="resumo-status" style="font-weight: 600; font-size: 24px;">--% Analisadas</p>
        <p class="caption texto-secundario mt-xs">Processamento ágil</p>
      </div>
    </div>

    <!-- Lista -->
    <div id="lista-historico" class="flex-col gap-lg mb-xl">
      <p class="caption text-center texto-secundario">Carregando faturas...</p>
    </div>

    <div class="flex justify-center mb-xl pb-lg">
      <button class="btn btn-outline-primary" style="border-radius: var(--radius-full); padding: 12px 24px; font-weight: 500; border-color: var(--outline-variant); color: var(--primary);" onclick="mostrarToast('Exibindo histórico completo.', 'info')">Ver faturas anteriores</button>
    </div>

  </main>

  <button class="fab" aria-label="Enviar Fatura" onclick="document.getElementById('btn-enviar-fatura').click()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
  </button>

  <div id="bottom-nav"></div>
  <div id="modal-upgrade-slot"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/paginas/historico.js"></script>
  <script>
    carregarLayoutAutenticado("historico");
    inicializarHistorico();
  </script>
</body>
</html>
