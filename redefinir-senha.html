<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha — EnergyCalc</title>
  <meta name="theme-color" content="#006b2c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>
  <main class="tela-auth">
    <div class="auth-cabecalho">
      <img src="icons/icon-192.png" alt="" class="auth-logo" />
      <h1 class="auth-titulo-app">EnergyCalc</h1>
      <p class="auth-tagline">Fortalecendo seu futuro sustentável.</p>
    </div>

    <div class="card auth-card">
      <h2 class="headline-md mb-lg">Redefinir senha</h2>

      <form id="form-redefinir">
        <div class="campo">
          <label for="nova-senha">Nova senha</label>
          <input type="password" id="nova-senha" required minlength="6" autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-redefinir">Redefinir senha</button>
      </form>

      <p class="caption" style="text-align:center; margin-top: var(--space-lg);">
        <a href="login" class="link-inline forte">Voltar para o login</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get("token");
    if (!token) {
      mostrarToast("Link inválido — solicite a redefinição novamente.", "erro");
    }

    document.getElementById("form-redefinir").addEventListener("submit", async (evento) => {
      evento.preventDefault();
      if (!token) return;
      const novaSenha = document.getElementById("nova-senha").value;
      await comCarregamento(document.getElementById("btn-redefinir"), "Salvando...", async () => {
        try {
          await apiPost("/auth/reset-password", { token, nova_senha: novaSenha });
          mostrarToast("Senha redefinida! Faça login com a nova senha.");
          setTimeout(() => (location.href = "login"), 1200);
        } catch (erro) {
          mostrarToast(erro.message, "erro");
        }
      });
    });
  </script>
</body>
</html>
