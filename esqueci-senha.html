<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esqueci minha senha — EnergyCalc</title>
  <meta name="theme-color" content="#006b2c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>
  <main class="tela-auth">
    <div class="auth-cabecalho">
      <img src="icons/icon-192.png" alt="" class="auth-logo" />
      <h1 class="auth-titulo-app">EnergyCalc</h1>
      <p class="auth-tagline">Fortalecendo seu futuro sustentável.</p>
    </div>

    <div class="card auth-card">
      <h2 class="headline-md mb-lg">Esqueci minha senha</h2>
      <p class="body-md mb-lg">Informe seu e-mail — se existir uma conta, enviaremos instruções de redefinição.</p>

      <form id="form-esqueci">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required autocomplete="email" placeholder="nome@empresa.com" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-enviar">Enviar instruções</button>
      </form>

      <p class="caption" style="text-align:center; margin-top: var(--space-lg);">
        <a href="login" class="link-inline forte">Voltar para o login</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.getElementById("form-esqueci").addEventListener("submit", async (evento) => {
      evento.preventDefault();
      const email = document.getElementById("email").value;
      await comCarregamento(document.getElementById("btn-enviar"), "Enviando...", async () => {
        try {
          const resultado = await apiPost("/auth/forgot-password", { email });
          mostrarToast(resultado.message || "Se o e-mail existir, enviamos instruções.");
          evento.target.reset();
        } catch (erro) {
          mostrarToast(erro.message, "erro");
        }
      });
    });
  </script>
</body>
</html>
